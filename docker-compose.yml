version: '3.8'

services:
  web:
    build: .
    container_name: mywebsite_web
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - website_network
    environment:
      - DB_HOST=db
      - DB_NAME=mywebsite
      - DB_USER=webuser
      - DB_PASSWORD=webpass

  db:
    image: mysql:8.0
    container_name: mywebsite_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: mywebsite
      MYSQL_USER: webuser
      MYSQL_PASSWORD: webpass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - website_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mywebsite_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - website_network

volumes:
  db_data:

networks:
  website_network:
    driver: bridge
